name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project: [frontend, backend]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm install
      - name: Build project
        working-directory: ${{ matrix.project }}
        run: |
          if [ "${{ matrix.project }}" = "frontend" ]; then
            npm run build
          else
            echo "Backend install completed"
          fi
